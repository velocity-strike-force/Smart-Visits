AWSTemplateFormatVersion: 2010-09-09
Transform:
- AWS::Serverless-2016-10-31

Parameters:
  STAGE:
    Type: String
    Default: dev
  DynamodbEndpoint:
    Type: String
    Default: ""
    Description: "DynamoDB endpoint override (set for local dev, leave empty for AWS)."
  SlackWebhookUrl:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Slack Incoming Webhook URL for signup notifications (optional)."

Globals:
  Function:
    Architectures:
      - x86_64
    LoggingConfig:
      LogFormat: JSON
      SystemLogLevel: DEBUG
    MemorySize: 128
    Runtime: nodejs24.x
    Timeout: 100
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref STAGE
        DYNAMODB_ENDPOINT: !Ref DynamodbEndpoint
  Api:
    Cors:
      AllowHeaders: "'*'"
      AllowMethods: "'GET, POST, PUT, DELETE, OPTIONS'"
      AllowOrigin: "'*'"
    TracingEnabled: true

Resources:
  VisitsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${STAGE}-smart-visits-Visits"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: visitId
          AttributeType: S
      KeySchema:
        - AttributeName: visitId
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${STAGE}-smart-visits-Users"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  SignupsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${STAGE}-smart-visits-Signups"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: visitId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: visitId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE

  FeedbackTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${STAGE}-smart-visits-Feedback"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: visitId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: visitId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE

  CustomersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${STAGE}-smart-visits-Customers"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH

  AuditLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${STAGE}-smart-visits-AuditLog"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: entityId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: entityId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  RolesTable:
    Type: AWS::DynamoDB::Table
    Condition: IsLocalStage
    Properties:
      TableName: !Sub "${STAGE}-smart-visits-Roles"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: roleId
          AttributeType: S
      KeySchema:
        - AttributeName: roleId
          KeyType: HASH

  ProductLinesTable:
    Type: AWS::DynamoDB::Table
    Condition: IsLocalStage
    Properties:
      TableName: !Sub "${STAGE}-smart-visits-ProductLines"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: productLineId
          AttributeType: S
      KeySchema:
        - AttributeName: productLineId
          KeyType: HASH

  UserProductLinesTable:
    Type: AWS::DynamoDB::Table
    Condition: IsLocalStage
    Properties:
      TableName: !Sub "${STAGE}-smart-visits-UserProductLines"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: productLineId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: productLineId
          KeyType: RANGE

  ReferenceDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${STAGE}-smart-visits-ReferenceData"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: domainId
          AttributeType: S
      KeySchema:
        - AttributeName: domainId
          KeyType: HASH

  # ── Visit ────────────────────────────────────────────────
  HandleVisitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub smart-visits-${STAGE}-handle-visit
      CodeUri: ./
      Handler: visit.handleVisitEndpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignupsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedbackTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RolesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductLinesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProductLinesTable
      Events:
        GetApi:
          Type: HttpApi
          Properties:
            Path: /api/visit
            Method: GET
        PostApi:
          Type: HttpApi
          Properties:
            Path: /api/visit
            Method: POST
        PutApi:
          Type: HttpApi
          Properties:
            Path: /api/visit
            Method: PUT
        DeleteApi:
          Type: HttpApi
          Properties:
            Path: /api/visit
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/handlers/visit.ts
        External:
          - "@aws-sdk/*"

  # ── Signup ───────────────────────────────────────────────
  HandleSignupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub smart-visits-${STAGE}-handle-signup
      CodeUri: ./
      Handler: signup.handleSignupEndpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignupsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedbackTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RolesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductLinesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProductLinesTable
      Events:
        GetApi:
          Type: HttpApi
          Properties:
            Path: /api/signup
            Method: GET
        PostApi:
          Type: HttpApi
          Properties:
            Path: /api/signup
            Method: POST
        DeleteApi:
          Type: HttpApi
          Properties:
            Path: /api/signup
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/handlers/signup.ts
        External:
          - "@aws-sdk/*"

  # ── Feedback ─────────────────────────────────────────────
  HandleFeedbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub smart-visits-${STAGE}-handle-feedback
      CodeUri: ./
      Handler: feedback.handleFeedbackEndpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignupsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedbackTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RolesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductLinesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProductLinesTable
      Events:
        GetApi:
          Type: HttpApi
          Properties:
            Path: /api/feedback
            Method: GET
        PostApi:
          Type: HttpApi
          Properties:
            Path: /api/feedback
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/handlers/feedback.ts
        External:
          - "@aws-sdk/*"

  # ── Profile ──────────────────────────────────────────────
  HandleProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub smart-visits-${STAGE}-handle-profile
      CodeUri: ./
      Handler: profile.handleProfileEndpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignupsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedbackTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RolesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductLinesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProductLinesTable
      Events:
        GetApi:
          Type: HttpApi
          Properties:
            Path: /api/profile
            Method: GET
        PostApi:
          Type: HttpApi
          Properties:
            Path: /api/profile
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/handlers/profile.ts
        External:
          - "@aws-sdk/*"

  # ── Analytics ────────────────────────────────────────────
  HandleAnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub smart-visits-${STAGE}-handle-analytics
      CodeUri: ./
      Handler: analytics.handleAnalyticsEndpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignupsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedbackTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RolesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductLinesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProductLinesTable
      Events:
        GetApi:
          Type: HttpApi
          Properties:
            Path: /api/analytics
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/handlers/analytics.ts
        External:
          - "@aws-sdk/*"

  # ── Customer ─────────────────────────────────────────────
  HandleCustomerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub smart-visits-${STAGE}-handle-customer
      CodeUri: ./
      Handler: customer.handleCustomerEndpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SignupsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FeedbackTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RolesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductLinesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProductLinesTable
      Events:
        GetApi:
          Type: HttpApi
          Properties:
            Path: /api/customer
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/handlers/customer.ts
        External:
          - "@aws-sdk/*"

  # ── Reference data (customers, roles, product lines, domains) ─
  HandleReferenceDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub smart-visits-${STAGE}-handle-reference-data
      CodeUri: ./
      Handler: referenceData.handleReferenceDataEndpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RolesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductLinesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReferenceDataTable
      Events:
        GetApi:
          Type: HttpApi
          Properties:
            Path: /api/reference-data
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/handlers/referenceData.ts
        External:
          - "@aws-sdk/*"
